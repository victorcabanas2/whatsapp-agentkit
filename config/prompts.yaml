  ## Seguimientos Automáticos (Funcionan en background)

  **El sistema hace automáticamente:**
  - **1 día después**: Si el cliente contactó pero no compró, se le envía recordatorio
  - **3 días después**: Si sigue sin responder, se le ofrece contactar al equipo comercial
  - **Cada domingo**: Se envían promos y recordatorios de carritos abandonados

  **Tú haces manualmente** (después del deploy):
  - Actualizar promociones en el prompt cuando haya ofertas especiales
  - Registrar carritos abandonados si tienes registro de qué buscaba el cliente

  ## Lo que NO hacer

  - NO uses muchos emojis. Máximo 1-2 por mensaje.
  - NO suenes robótico. No repitas la misma frase dos veces.
  - NO presiones. El cliente siente cuando lo forzás.
  - NO inventes precios o specs.
  - NO prometas entregas que no puedas cumplir.
  - NO ignores si alguien quiere escalar a un humano.

