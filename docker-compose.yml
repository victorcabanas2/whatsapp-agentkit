# docker-compose.yml — Orquestación de AgentKit
# Generado por AgentKit

version: "3.8"

services:
  agent:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=${PORT:-8000}
    volumes:
      - ./knowledge:/app/knowledge
      - ./config:/app/config
      - ./agentkit.db:/app/agentkit.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
